name: Deploy VitePress site to Pages

on:
  # 1. This enables you to trigger it manually from the GitHub Actions tab
  workflow_dispatch:

  # 2. This listens for pushes to main
  push:
    branches: [main]

# Grant GITHUB_TOKEN the permissions required to make a Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # 3. THE MAGIC: Only run if manually triggered OR if the commit message contains "[deploy docs]"
    if: "contains(github.event.head_commit.message, '[deploy docs]') || github.event_name == 'workflow_dispatch'"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: ./website
        run: npm ci # (or 'npm install' if you don't have a package-lock.json yet)

      - name: Build with VitePress
        working-directory: ./website
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Point this to where VitePress builds the files
          path: website/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4